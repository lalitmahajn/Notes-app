<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="A secure, login-based notes application. Create, edit and manage your private notes anywhere." />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Secure Notes</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/notes_192px.png" />
  <link rel="icon" type="image/png" sizes="128x128" href="icons/notes_128px.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Markdown parser (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ============================================================
       AUTH SECTION
       ============================================================ -->
  <section id="auth-section">
    <div class="auth-card">
      <h1>📝 Secure Notes</h1>
      <p class="subtitle" id="auth-subtitle">Sign in to access your notes</p>

      <form id="auth-form" autocomplete="off">
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" required minlength="6"
            autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="auth-submit-btn">Sign In</button>
      </form>

      <div class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <button type="button" id="auth-toggle-btn">Sign Up</button>
      </div>
    </div>
  </section>

  <!-- ============================================================
       APP SECTION (hidden until logged in)
       ============================================================ -->
  <section id="app-section" class="hidden">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="btn-sidebar-toggle" id="sidebar-toggle-btn" aria-label="Toggle sidebar">☰</button>
        <div class="logo">📝 Secure Notes</div>
        <span class="sync-status" id="sync-status">Synced ✓</span>
        <button class="btn-icon btn-sync" id="sync-btn" title="Force sync">🔄</button>
      </div>
      <div class="user-info">
        <button class="btn btn-sm pwa-install-btn hidden" id="pwa-install-btn">📲 Install</button>
        <span class="user-email" id="user-email"></span>
        <button class="btn btn-sm btn-logout" id="logout-btn">Log Out</button>
      </div>
    </header>

    <div class="app-body">
      <!-- Sidebar (mobile backdrop) -->
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3>Folders</h3>
        </div>
        <ul class="sidebar-list" id="folder-list">
          <li class="sidebar-item active" data-folder-id="all">
            <span>📋</span>
            <span>All Notes</span>
            <span class="folder-count" id="all-notes-count"></span>
          </li>
          <!-- Folders rendered by JS -->
        </ul>
        <div class="sidebar-footer">
          <button class="btn-new-folder" id="new-folder-btn">+ New Folder</button>
        </div>
      </aside>

      <!-- Main Area (Notes List & Editor Panes) -->
      <div class="app-main">

        <!-- ==========================================
             MIDDLE PANE: Notes List
             ========================================== -->
        <section class="notes-list-pane" id="notes-list-pane">
          <!-- Toolbar -->
          <div class="toolbar">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="Search notes…" />
            </div>
            <select class="sort-select" id="sort-select">
              <option value="updated_desc">Last Updated</option>
              <option value="created_desc">Newest First</option>
              <option value="created_asc">Oldest First</option>
              <option value="title_asc">Title A–Z</option>
              <option value="title_desc">Title Z–A</option>
            </select>
          </div>



          <!-- Main Content -->
          <main class="app-content">

            <div class="notes-grid" id="notes-grid"></div>
            <!-- FAB moved to middle pane to avoid overlapping editor bottom bar -->
            <button class="fab" id="fab-btn" aria-label="Create new note">+</button>
          </main>
        </section>

        <!-- ==========================================
             RIGHT PANE: Note Editor
             ========================================== -->
        <section class="note-editor-pane" id="note-editor-pane">
          <!-- Mobile Back Button -->
          <div class="editor-mobile-header">
            <button class="btn btn-ghost" id="editor-back-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              Back to list
            </button>
          </div>

          <div class="editor-empty-state" id="editor-empty-state">
            <div class="empty-icon" style="opacity: 0.5; margin-bottom: var(--sp-3);">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 6h4"></path>
                <path d="M2 10h4"></path>
                <path d="M2 14h4"></path>
                <path d="M2 18h4"></path>
                <rect width="16" height="20" x="4" y="2" rx="2"></rect>
                <path d="M9.5 8h5"></path>
                <path d="M9.5 12H16"></path>
                <path d="M9.5 16H14"></path>
              </svg>
            </div>
            <p>No note selected</p>
            <span>Select a note from the list or create a new one.</span>
          </div>

          <div class="editor-content-area hidden" id="editor-content-area">
            <form id="note-form" style="display:flex; flex-direction:column; flex:1; position: relative;">
              <input type="text" id="note-title-input" class="editor-title-input" placeholder="Note title" required />
              <div class="editor-divider"></div>

              <div class="editor-body-wrapper">
                <div class="editor-tags-wrapper hidden" id="editor-tags-wrapper">
                  <div class="tag-input-wrapper" id="tag-input-wrapper">
                    <input type="text" id="tag-input" class="tag-input" placeholder="Add tag..." />
                  </div>
                </div>
                <textarea id="note-content-input" class="editor-textarea-input"
                  placeholder="Start writing... (supports **bold**, *italic*, - lists, # headings, `code`)"></textarea>
                <div id="note-preview-pane" class="editor-preview-pane hidden view-note-body"></div>
              </div>

              <!-- Bottom Bar -->
              <div class="editor-bottom-bar" id="editor-bottom-bar">
                <div class="bar-left">
                  <button type="button" class="btn-icon" id="editor-preview-btn" title="Toggle Preview">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                  <button type="button" class="btn-icon" id="editor-pin-btn" title="Toggle Pin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                      </polygon>
                    </svg>
                  </button>
                  <button type="button" class="btn-icon" id="editor-tags-btn" title="Add Tags">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                      <line x1="7" y1="7" x2="7.01" y2="7"></line>
                    </svg>
                  </button>
                  <button type="button" class="btn-icon btn-danger" id="editor-delete-btn" title="Delete Note">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"></polyline>
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                  </button>
                  <button type="button" class="btn-icon btn-save" id="editor-save-btn" title="Save Note">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                      <polyline points="17 21 17 13 7 13 7 21"></polyline>
                      <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                  </button>
                  <span class="autosave-status hidden" id="autosave-status">Saved</span>
                </div>
                <div class="bar-right">
                  <button type="button" class="btn-icon btn-sync" id="editor-sync-btn" title="Force sync">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="23 4 23 10 17 10"></polyline>
                      <polyline points="1 20 1 14 7 14"></polyline>
                      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                  </button>
                  <button type="button" class="btn-icon" id="settings-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="3"></circle>
                      <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                      </path>
                    </svg>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>

  </section>

  <!-- Modals removed for 3-pane layout -->
  <!-- ============================================================
       FOLDER MODAL
       ============================================================ -->
  <div class="modal-overlay" id="folder-modal">
    <div class="modal-card" style="max-width:400px">
      <h2 id="folder-modal-title">New Folder</h2>
      <form id="folder-form">
        <div class="form-group">
          <label for="folder-name-input">Name</label>
          <input type="text" id="folder-name-input" placeholder="Folder name" required />
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="folder-color-picker" id="folder-color-picker">
            <div class="color-swatch active" data-color="#0a84ff" style="background:#0a84ff"></div>
            <div class="color-swatch" data-color="#ff453a" style="background:#ff453a"></div>
            <div class="color-swatch" data-color="#30d158" style="background:#30d158"></div>
            <div class="color-swatch" data-color="#ffd60a" style="background:#ffd60a"></div>
            <div class="color-swatch" data-color="#5e5ce6" style="background:#5e5ce6"></div>
            <div class="color-swatch" data-color="#34d399" style="background:#34d399"></div>
            <div class="color-swatch" data-color="#fbbf24" style="background:#fbbf24"></div>
            <div class="color-swatch" data-color="#60a5fa" style="background:#60a5fa"></div>
            <div class="color-swatch" data-color="#f472b6" style="background:#f472b6"></div>
            <div class="color-swatch" data-color="#a78bfa" style="background:#a78bfa"></div>
            <div class="color-swatch" data-color="#fb923c" style="background:#fb923c"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="folder-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- App Logic -->
  <!-- Local config override (gitignored, silently skipped if missing) -->
  <script src="config.local.js" onerror="/* not found — using GitHub Actions placeholders */"></script>

  <!-- Modular app scripts (load order matters) -->
  <script src="app/config.js"></script>
  <script src="app/services/supabase.js"></script>
  <script src="app/services/auth.js"></script>
  <script src="app/services/folders.js"></script>
  <script src="app/services/notes.js"></script>
  <script src="app/services/indexeddb.js"></script>
  <script src="app/utils/helpers.js"></script>
  <script src="app/services/sync.js"></script>
  <script src="app/services/markdown.js"></script>
  <script src="app/ui/controller.js"></script>
  <script src="app/main.js"></script>
</body>

</html>
