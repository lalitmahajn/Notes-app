<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A secure, login-based notes application. Create, edit and manage your private notes anywhere." />
  <title>Secure Notes</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       AUTH SECTION
       ============================================================ -->
  <section id="auth-section">
    <div class="auth-card">
      <h1>📝 Secure Notes</h1>
      <p class="subtitle" id="auth-subtitle">Sign in to access your notes</p>

      <form id="auth-form" autocomplete="off">
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input
            type="email"
            id="auth-email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input
            type="password"
            id="auth-password"
            placeholder="••••••••"
            required
            minlength="6"
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="btn btn-primary" id="auth-submit-btn">
          Sign In
        </button>
      </form>

      <div class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <button type="button" id="auth-toggle-btn">Sign Up</button>
      </div>
    </div>
  </section>

  <!-- ============================================================
       APP SECTION (hidden until logged in)
       ============================================================ -->
  <section id="app-section" class="hidden">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="logo">📝 Secure Notes</div>
      <div class="user-info">
        <span class="user-email" id="user-email"></span>
        <button class="btn btn-sm btn-logout" id="logout-btn">Log Out</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-content">
      <div class="notes-header">
        <h2>My Notes <span class="notes-count" id="notes-count"></span></h2>
        <button class="btn btn-primary" id="new-note-btn" style="width:auto">+ New Note</button>
      </div>

      <div class="notes-grid" id="notes-grid">
        <!-- Note cards rendered by JS -->
      </div>
    </main>

    <!-- Floating Action Button (mobile shortcut) -->
    <button class="fab" id="fab-btn" aria-label="Create new note">+</button>
  </section>

  <!-- ============================================================
       NOTE MODAL
       ============================================================ -->
  <div class="modal-overlay" id="note-modal">
    <div class="modal-card">
      <h2 id="modal-title">New Note</h2>
      <form id="note-form">
        <div class="form-group">
          <label for="note-title-input">Title</label>
          <input type="text" id="note-title-input" placeholder="Note title" required />
        </div>
        <div class="form-group">
          <label for="note-content-input">Content</label>
          <textarea id="note-content-input" placeholder="Write something…"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="modal-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-save" id="modal-save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============================================================
       TOAST
       ============================================================ -->
  <div id="toast"></div>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
